<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillsFix Onboarding</title>
    <script>
      // Early safety guard for window.fetch override attempts
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: () => originalFetch,
              set: () => { 
                console.warn('Blocked early attempt to override native fetch');
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
